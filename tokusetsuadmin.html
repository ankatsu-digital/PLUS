<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>記事管理 | アンカツ＋ Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#faf9f6;--card:#fff;--sub:#f3f1ec;
  --ink:#1a1a18;--muted:#6b6b5e;--light:#999990;
  --acc:#2d6a4f;--accl:#52b788;--accp:#d8f3dc;
  --danger:#e63946;--border:#e0ddd4;
  --serif:'Noto Serif JP',serif;--sans:'Noto Sans JP',sans-serif;
  --r:8px;--tr:.2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.7;min-height:100vh;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}

/* Login */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
#login-screen.hide{display:none;}
.lbox{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:2.2rem 2rem;max-width:380px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.07);}
.lbox h1{font-family:var(--serif);font-size:1.2rem;font-weight:800;color:var(--acc);margin-bottom:.2rem;}
.lbox .sub{font-size:.8rem;color:var(--muted);margin-bottom:1.6rem;}

/* App */
#app-screen{display:none;}
#app-screen.show{display:block;}

/* Header */
.adm-hdr{position:sticky;top:0;z-index:50;background:var(--card);
  border-bottom:1px solid var(--border);padding:.75rem 1.4rem;
  display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
.adm-hdr h1{font-family:var(--serif);font-size:1rem;font-weight:800;color:var(--acc);flex:1;min-width:0;}
.hdr-em{font-size:.75rem;color:var(--muted);white-space:nowrap;}

/* Tabs */
.tab-bar{display:flex;border-bottom:2px solid var(--border);background:var(--card);
  padding:0 1.4rem;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:.7rem 1.1rem;font-size:.83rem;font-weight:700;color:var(--muted);
  border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;
  transition:color var(--tr),border-color var(--tr);}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc);}
.tab-panel{display:none;max-width:920px;margin:0 auto;padding:1.4rem 1.2rem 3rem;}
.tab-panel.active{display:block;}

/* Panel */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:1.4rem;margin-bottom:1.2rem;}
.ptitle{font-family:var(--serif);font-size:.98rem;font-weight:800;color:var(--acc);margin-bottom:1rem;}

/* Form */
.field{margin-bottom:.95rem;}
.field label,.flbl{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:.28rem;}
.fhint{font-size:.7rem;color:var(--light);margin-top:.22rem;}
input[type=text],input[type=email],input[type=url],input[type=password],select,textarea{
  width:100%;padding:.58rem .75rem;border:1.5px solid var(--border);border-radius:6px;
  font-size:.88rem;font-family:inherit;background:var(--card);color:var(--ink);outline:none;
  transition:border-color var(--tr),box-shadow var(--tr);
}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accp);}
textarea{resize:vertical;line-height:1.7;}
.mono{font-family:monospace;font-size:.78rem;}
.row2{display:grid;gap:.75rem;grid-template-columns:1fr 1fr;}
.cbrow{display:flex;align-items:center;gap:.5rem;}
.cbrow input[type=checkbox]{width:auto;}
@media(max-width:560px){.row2{grid-template-columns:1fr;}}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;font-weight:700;
  padding:.52rem 1.1rem;border-radius:6px;cursor:pointer;
  transition:background var(--tr),color var(--tr),border-color var(--tr);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-p{background:var(--acc);color:#fff;border:1px solid var(--acc);}
.btn-p:hover:not(:disabled){background:var(--accl);border-color:var(--accl);}
.btn-g{background:var(--sub);color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{background:var(--accp);color:var(--acc);border-color:var(--accl);}
.btn-d{background:#fff;color:var(--danger);border:1px solid var(--danger);}
.btn-d:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:.32rem .7rem;font-size:.74rem;}
.acts{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.7rem;}

/* Status */
.st{font-size:.8rem;padding:.6rem .9rem;border-radius:6px;margin-top:.7rem;display:none;}
.st.show{display:block;}
.st.ok{background:var(--accp);color:var(--acc);}
.st.err{background:#fde2e2;color:var(--danger);}

/* Tags */
.tag-row{display:flex;flex-wrap:wrap;gap:.32rem;margin-top:.38rem;}
.tchip{display:inline-flex;align-items:center;gap:.28rem;background:var(--accp);color:var(--acc);
  font-size:.73rem;padding:.18rem .52rem;border-radius:20px;}
.tchip button{font-size:.82rem;line-height:1;background:none;border:none;color:var(--acc);cursor:pointer;}

/* Article list */
.art-row{display:flex;gap:.85rem;align-items:flex-start;padding:.85rem;
  border:1px solid var(--border);border-radius:var(--r);margin-bottom:.55rem;background:var(--card);}
.art-th{width:58px;height:42px;border-radius:4px;flex-shrink:0;object-fit:cover;
  background:var(--sub);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.art-info{flex:1;min-width:0;}
.art-ttl{font-weight:700;font-size:.86rem;line-height:1.45;margin-bottom:.22rem;}
.art-meta{font-size:.7rem;color:var(--light);display:flex;gap:.45rem;flex-wrap:wrap;align-items:center;}
.cbadge{font-size:.64rem;font-weight:700;color:var(--acc);background:var(--accp);padding:.08rem .42rem;border-radius:3px;}
.fbadge{font-size:.64rem;font-weight:700;color:#8a6300;background:#fff3da;padding:.08rem .42rem;border-radius:3px;}
.art-btns{display:flex;flex-direction:column;gap:.32rem;flex-shrink:0;}

/* Builder */
.sc-card{background:var(--sub);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.75rem;}
.sc-head{display:flex;align-items:center;gap:.55rem;margin-bottom:.75rem;}
.sc-num{font-family:var(--serif);font-size:.72rem;color:var(--acc);font-weight:800;}
.sc-type{font-size:.76rem;color:var(--muted);}
.tl-sub,.q-sub{background:#fff;border-left:3px solid var(--accp);padding:.65rem .85rem;
  margin-bottom:.55rem;border-radius:0 4px 4px 0;}
.preview-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem;font-size:.76rem;color:var(--muted);min-height:80px;max-height:260px;
  overflow-y:auto;line-height:1.7;white-space:pre-wrap;word-break:break-all;}
.empty-txt,.loading-txt{text-align:center;color:var(--light);padding:1.8rem;font-size:.82rem;}
.help-note{background:var(--accp);border:1px solid var(--accl);border-radius:var(--r);
  padding:.85rem 1rem;font-size:.78rem;margin-bottom:1.1rem;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="lbox">
    <h1>📝 アンカツ＋ Admin</h1>
    <p class="sub">管理者アカウントでログインしてください</p>
    <div class="field">
      <label for="l-email">メールアドレス</label>
      <input type="email" id="l-email" autocomplete="username" placeholder="admin@example.com" />
    </div>
    <div class="field">
      <label for="l-pass">パスワード</label>
      <input type="password" id="l-pass" autocomplete="current-password" />
    </div>
    <button class="btn btn-p" id="login-btn" style="width:100%;justify-content:center;margin-top:.4rem;">
      ログイン
    </button>
    <div class="st" id="lst"></div>
  </div>
</div>

<!-- 管理画面 -->
<div id="app-screen">
  <header class="adm-hdr">
    <h1>📝 アンカツ＋ 記事管理</h1>
    <span class="hdr-em" id="hdr-em"></span>
    <a class="btn btn-g btn-sm" href="index.html">← サイトへ</a>
    <button class="btn btn-g btn-sm" id="logout-btn">ログアウト</button>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="post">📄 記事投稿・管理</button>
    <button class="tab-btn" data-tab="builder">✨ 特設サイト作成</button>
  </div>

  <!-- TAB: 記事投稿・管理 -->
  <div class="tab-panel active" id="tab-post">

    <div class="panel">
      <div class="ptitle" id="form-ttl">新規記事を投稿</div>
      <input type="hidden" id="edit-id" />

      <div class="field">
        <label>タイトル <span style="color:var(--danger)">*</span></label>
        <input type="text" id="f-title" placeholder="記事タイトルを入力してください" />
      </div>

      <div class="row2">
        <div class="field">
          <label>カテゴリ <span style="color:var(--danger)">*</span></label>
          <select id="f-cat">
            <option>まちの話題</option><option>イベント</option>
            <option>空き家活用</option><option>商店街</option>
            <option>文化</option><option selected>インタビュー</option>
            <option>学校・子育て</option><option>移住・定住</option>
            <option>お知らせ</option><option>視察レポート</option>
          </select>
        </div>
        <div class="field">
          <label>著者</label>
          <input type="text" id="f-author" value="編集部" />
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>スラッグ（URL用・英数字）</label>
          <input type="text" id="f-slug" placeholder="例: sekai-hotel-fuse-report" />
          <div class="fhint">空欄の場合はFirestoreの自動IDが使われます</div>
        </div>
        <div class="field">
          <label>サムネイル画像URL</label>
          <input type="url" id="f-thumb" placeholder="https://..." />
        </div>
      </div>

      <div class="field">
        <label>タグ（Enterで追加）</label>
        <input type="text" id="f-tag-in" placeholder="タグを入力してEnter" />
        <div class="tag-row" id="tag-list"></div>
      </div>

      <div class="field">
        <label>本文（HTML） <span style="color:var(--danger)">*</span></label>
        <textarea id="f-body" class="mono" style="min-height:220px;"
          placeholder="<p>本文…</p>"></textarea>
        <div class="fhint">通常のHTMLを入力。特設サイト作成タブで生成したHTMLをそのまま貼ることもできます。</div>
      </div>

      <div class="field cbrow">
        <input type="checkbox" id="f-feat" />
        <label for="f-feat" style="font-size:.86rem;margin:0;">トップページの注目記事（featured）にする</label>
      </div>

      <div class="acts">
        <button class="btn btn-p" id="save-btn">保存する</button>
        <button class="btn btn-g" id="cancel-btn" style="display:none;">キャンセル</button>
        <button class="btn btn-g" id="load-sekai-btn">📋 SEKAI HOTEL記事を読み込む</button>
      </div>
      <div class="st" id="fst"></div>
    </div>

    <div class="panel">
      <div class="ptitle">投稿済み記事一覧</div>
      <div id="art-list"><div class="loading-txt">読み込み中…</div></div>
    </div>

  </div>

  <!-- TAB: 特設サイト作成 -->
  <div class="tab-panel" id="tab-builder">
    <div class="help-note">
      フォームに入力するだけでスタイル付きHTMLを生成します。
      「本文欄に転記」ボタンで記事投稿タブに自動入力されます。
    </div>

    <div class="panel">
      <div class="ptitle">① 基本情報</div>
      <div class="field"><label>特集タイトル</label>
        <input type="text" id="b-title" placeholder="まちに泊まる、新しい旅のかたち。" /></div>
      <div class="field"><label>リード文</label>
        <textarea id="b-lead" style="min-height:70px;" placeholder="導入文…"></textarea></div>
      <div class="row2">
        <div class="field"><label>ヒーロー画像URL</label>
          <input type="url" id="b-img" placeholder="https://..." /></div>
        <div class="field"><label>ヒーロー背景色（画像なし時）</label>
          <input type="text" id="b-color" value="#2c4d39" /></div>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle">② セクション</div>
      <div id="secs"></div>
      <div class="acts">
        <button class="btn btn-g btn-sm" id="add-text">＋ テキスト</button>
        <button class="btn btn-g btn-sm" id="add-tl">＋ タイムライン</button>
        <button class="btn btn-g btn-sm" id="add-qa">＋ Q&amp;A・引用</button>
        <button class="btn btn-g btn-sm" id="add-close">＋ まとめ</button>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle">③ 生成・コピー</div>
      <div class="acts" style="margin-bottom:.8rem;">
        <button class="btn btn-p" id="gen-btn">▶ HTMLを生成</button>
        <button class="btn btn-g" id="copy-btn">📋 コピー</button>
        <button class="btn btn-g" id="to-post-btn">→ 本文欄に転記</button>
      </div>
      <div class="preview-box" id="preview">ここに生成されたHTMLが表示されます</div>
      <div class="st" id="bst"></div>
    </div>
  </div>

</div><!-- /app-screen -->

<!-- Firebase compat SDK（type=moduleではなく通常script） -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
(function(){
'use strict';

/* ---------- Firebase初期化 ---------- */
firebase.initializeApp({
  apiKey:            "AIzaSyC4HUWd4c5_fdgA-k34i1uthozfqYcRn9A",
  authDomain:        "ankatsu-d4816.firebaseapp.com",
  projectId:         "ankatsu-d4816",
  storageBucket:     "ankatsu-d4816.firebasestorage.app",
  messagingSenderId: "1005813876395",
  appId:             "1:1005813876395:web:29153748d2a99c6584d9ee"
});
var db   = firebase.firestore();
var auth = firebase.auth();

/* ---------- 状態 ---------- */
var tags        = [];
var allArticles = [];
var secList     = [];
var secCnt      = 0;
var genHTML     = '';

var EMOJI = {
  'まちの話題':'🏘️','イベント':'🎉','空き家活用':'🏠','商店街':'🛍️',
  '文化':'🎨','インタビュー':'🎙️','学校・子育て':'📚','移住・定住':'🌱',
  'お知らせ':'📢','視察レポート':'🧭'
};

var SEKAI = """ + sekai_js + """;

/* ---------- Auth ---------- */
auth.onAuthStateChanged(function(user){
  if(user){
    $('login-screen').classList.add('hide');
    $('app-screen').classList.add('show');
    $('hdr-em').textContent = user.email;
    loadArticles();
  } else {
    $('login-screen').classList.remove('hide');
    $('app-screen').classList.remove('show');
  }
});

$('login-btn').addEventListener('click', doLogin);
$('l-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
$('logout-btn').addEventListener('click', function(){ auth.signOut(); });

function doLogin(){
  var email = $('l-email').value.trim();
  var pass  = $('l-pass').value;
  if(!email||!pass){ showSt('lst','メールとパスワードを入力してください','err'); return; }
  var btn = $('login-btn');
  btn.disabled=true; btn.textContent='ログイン中…';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e){ showSt('lst','ログイン失敗: '+e.message,'err'); })
    .finally(function(){ btn.disabled=false; btn.textContent='ログイン'; });
}

/* ---------- Tabs ---------- */
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var t = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    $('tab-'+t).classList.add('active');
  });
});

/* ---------- Tags ---------- */
$('f-tag-in').addEventListener('keydown', function(e){
  if(e.key!=='Enter') return;
  e.preventDefault();
  var v = e.target.value.trim().replace(/^#/,'');
  if(v && tags.indexOf(v)<0){ tags.push(v); renderTags(); }
  e.target.value='';
});
function renderTags(){
  $('tag-list').innerHTML = tags.map(function(t,i){
    return '<span class="tchip">#'+es(t)+' <button data-i="'+i+'">×</button></span>';
  }).join('');
  $('tag-list').querySelectorAll('button').forEach(function(b){
    b.addEventListener('click', function(){ tags.splice(+b.dataset.i,1); renderTags(); });
  });
}

/* ---------- CRUD ---------- */
function loadArticles(){
  $('art-list').innerHTML = '<div class="loading-txt">読み込み中…</div>';
  db.collection('articles').orderBy('createdAt','desc').get()
    .then(function(snap){
      allArticles = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
      renderList();
    })
    .catch(function(e){ $('art-list').innerHTML='<div class="empty-txt">エラー: '+es(e.message)+'</div>'; });
}

function renderList(){
  if(!allArticles.length){ $('art-list').innerHTML='<div class="empty-txt">まだ記事がありません</div>'; return; }
  $('art-list').innerHTML = allArticles.map(function(a){
    var th = a.thumbnail
      ? '<img class="art-th" src="'+es(a.thumbnail)+'" alt="" />'
      : '<div class="art-th">'+(EMOJI[a.category]||'📰')+'</div>';
    var ds='';
    try{ if(a.createdAt&&a.createdAt.toDate) ds=a.createdAt.toDate().toLocaleDateString('ja-JP'); }catch(e){}
    return '<div class="art-row">'+th
      +'<div class="art-info"><div class="art-ttl">'+es(a.title||'(無題)')+'</div>'
      +'<div class="art-meta"><span class="cbadge">'+es(a.category||'')+'</span>'
      +(a.featured?'<span class="fbadge">★ 注目</span>':'')
      +(ds?'<span>'+ds+'</span>':'')+(a.author?'<span>✍️ '+es(a.author)+'</span>':'')
      +'</div></div>'
      +'<div class="art-btns">'
      +'<button class="btn btn-g btn-sm" data-edit="'+a.id+'">編集</button>'
      +'<button class="btn btn-d btn-sm" data-del="'+a.id+'">削除</button>'
      +'</div></div>';
  }).join('');
  $('art-list').querySelectorAll('[data-edit]').forEach(function(b){
    b.addEventListener('click', function(){ editArt(b.dataset.edit); });
  });
  $('art-list').querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click', function(){ delArt(b.dataset.del); });
  });
}

$('save-btn').addEventListener('click', saveArt);
$('cancel-btn').addEventListener('click', resetForm);

function saveArt(){
  var title = $('f-title').value.trim();
  var body  = $('f-body').value.trim();
  if(!title){ showSt('fst','タイトルを入力してください','err'); return; }
  if(!body) { showSt('fst','本文を入力してください','err'); return; }
  var btn = $('save-btn');
  btn.disabled=true; btn.textContent='保存中…';
  var eid  = $('edit-id').value;
  var data = {
    title:     title,
    slug:      $('f-slug').value.trim()||null,
    category:  $('f-cat').value,
    author:    $('f-author').value.trim()||'編集部',
    thumbnail: $('f-thumb').value.trim(),
    tags:      tags.slice(),
    body:      body,
    featured:  $('f-feat').checked
  };
  var p = eid
    ? db.collection('articles').doc(eid).update(data)
    : (data.createdAt=firebase.firestore.FieldValue.serverTimestamp(), db.collection('articles').add(data));
  p.then(function(){
    showSt('fst', eid?'✅ 更新しました':'✅ 投稿しました','ok');
    resetForm(); loadArticles();
  }).catch(function(e){ showSt('fst','保存失敗: '+e.message,'err'); })
  .finally(function(){ btn.disabled=false; btn.textContent=eid?'更新する':'保存する'; });
}

function editArt(id){
  var a = allArticles.find(function(x){ return x.id===id; });
  if(!a) return;
  $('edit-id').value  = a.id;
  $('f-title').value  = a.title||'';
  $('f-cat').value    = a.category||'まちの話題';
  $('f-author').value = a.author||'編集部';
  $('f-slug').value   = a.slug||'';
  $('f-thumb').value  = a.thumbnail||'';
  $('f-body').value   = a.body||'';
  $('f-feat').checked = !!a.featured;
  tags = Array.isArray(a.tags)?a.tags.slice():[];
  renderTags();
  $('form-ttl').textContent   = '記事を編集';
  $('save-btn').textContent   = '更新する';
  $('cancel-btn').style.display='';
  document.querySelector('[data-tab="post"]').click();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetForm(){
  $('edit-id').value=''; $('f-title').value=''; $('f-slug').value='';
  $('f-thumb').value=''; $('f-body').value='';
  $('f-author').value='編集部'; $('f-cat').value='インタビュー';
  $('f-feat').checked=false;
  tags=[]; renderTags();
  $('form-ttl').textContent='新規記事を投稿';
  $('save-btn').textContent='保存する';
  $('cancel-btn').style.display='none';
}

function delArt(id){
  if(!confirm('この記事を削除しますか？')) return;
  db.collection('articles').doc(id).delete()
    .then(loadArticles)
    .catch(function(e){ alert('削除失敗: '+e.message); });
}

$('load-sekai-btn').addEventListener('click', function(){
  $('f-title').value  = 'まちに泊まる、新しい旅のかたち。SEKAI HOTEL Deep Osaka Experience 視察レポート';
  $('f-cat').value    = '視察レポート';
  $('f-author').value = '編集部';
  $('f-slug').value   = 'sekai-hotel-fuse-report';
  $('f-thumb').value  = '';
  $('f-body').value   = SEKAI;
  $('f-feat').checked = true;
  tags=['空き家活用','商店街','移住・定住','まちづくり','関係人口'];
  renderTags();
  showSt('fst','SEKAI HOTEL記事を読み込みました。確認後「保存する」を押してください','ok');
  window.scrollTo({top:0,behavior:'smooth'});
});

/* ---------- 特設サイトビルダー ---------- */
$('add-text').addEventListener('click',  function(){ addSec('text'); });
$('add-tl').addEventListener('click',    function(){ addSec('tl'); });
$('add-qa').addEventListener('click',    function(){ addSec('qa'); });
$('add-close').addEventListener('click', function(){ addSec('close'); });

function addSec(type){
  secCnt++;
  var sid = 'sc'+secCnt;
  secList.push({id:sid,type:type});
  var lblMap = {text:'テキスト',tl:'タイムライン',qa:'Q&A・引用',close:'まとめ'};
  var div = document.createElement('div');
  div.className='sc-card'; div.id=sid;
  var h = '<div class="sc-head">'
    +'<span class="sc-num">Section '+secCnt+'</span>'
    +'<span class="sc-type">'+lblMap[type]+'</span>'
    +'<button class="btn btn-d btn-sm sc-del" data-sid="'+sid+'" style="margin-left:auto;">削除</button>'
    +'</div>';
  if(type==='text'){
    h+='<div class="field"><label>見出し</label>'
      +'<input type="text" class="sc-h" placeholder="例：洲本で活かせる視点" /></div>'
      +'<div class="field"><label>本文（2連続改行で段落区切り）</label>'
      +'<textarea class="sc-b" style="min-height:100px;" placeholder="本文を入力…"></textarea></div>';
  } else if(type==='tl'){
    h+='<div class="field"><label>タイムライン見出し</label>'
      +'<input type="text" class="sc-h" placeholder="例：実際に泊まってみた" /></div>'
      +'<div class="sc-tl-wrap"></div>'
      +'<button class="btn btn-g btn-sm add-tl-item" style="margin-top:.3rem;">＋ 項目追加</button>';
  } else if(type==='qa'){
    h+='<div class="field"><label>インタビュー見出し</label>'
      +'<input type="text" class="sc-h" placeholder="例：スタッフに聞く" /></div>'
      +'<div class="sc-qa-wrap"></div>'
      +'<button class="btn btn-g btn-sm add-qa-item" style="margin-top:.3rem;">＋ Q&amp;A追加</button>';
  } else if(type==='close'){
    h+='<div class="field"><label>締めの一言</label>'
      +'<input type="text" class="sc-h" placeholder="例：泊まることが、まちを知ることになる。" /></div>'
      +'<div class="field"><label>本文</label>'
      +'<textarea class="sc-b" style="min-height:70px;" placeholder="まとめの文章…"></textarea></div>';
  }
  div.innerHTML=h;
  $('secs').appendChild(div);
  div.querySelector('.sc-del').addEventListener('click', function(){
    secList=secList.filter(function(s){ return s.id!==sid; }); div.remove();
  });
  if(type==='tl'){
    div.querySelector('.add-tl-item').addEventListener('click',function(){
      addTlItem(div.querySelector('.sc-tl-wrap'));
    });
    addTlItem(div.querySelector('.sc-tl-wrap'));
  }
  if(type==='qa'){
    div.querySelector('.add-qa-item').addEventListener('click',function(){
      addQaItem(div.querySelector('.sc-qa-wrap'));
    });
    addQaItem(div.querySelector('.sc-qa-wrap'));
  }
}

function addTlItem(wrap){
  var d=document.createElement('div'); d.className='tl-sub';
  d.innerHTML='<div class="row2" style="margin-bottom:.3rem;">'
    +'<input type="text" class="tl-time" placeholder="時刻・ポイント（例: 15:30 布施駅到着）" />'
    +'<input type="text" class="tl-emoji" placeholder="絵文字（例: 🚉）" /></div>'
    +'<input type="text" class="tl-ttl" placeholder="小見出し" style="margin-bottom:.3rem;" />'
    +'<textarea class="tl-body" style="min-height:60px;" placeholder="説明文"></textarea>'
    +'<div style="margin-top:.3rem;"><button class="btn btn-d btn-sm">削除</button></div>';
  d.querySelector('button').addEventListener('click',function(){ d.remove(); });
  wrap.appendChild(d);
}

function addQaItem(wrap){
  var d=document.createElement('div'); d.className='q-sub';
  d.innerHTML='<input type="text" class="qa-q" placeholder="質問" style="margin-bottom:.3rem;" />'
    +'<textarea class="qa-a" style="min-height:65px;" placeholder="回答"></textarea>'
    +'<div style="margin-top:.3rem;"><button class="btn btn-d btn-sm">削除</button></div>';
  d.querySelector('button').addEventListener('click',function(){ d.remove(); });
  wrap.appendChild(d);
}

$('gen-btn').addEventListener('click', function(){
  genHTML = buildHTML();
  $('preview').textContent = genHTML;
  showSt('bst','HTMLを生成しました','ok');
});
$('copy-btn').addEventListener('click', function(){
  if(!genHTML){ showSt('bst','先に「HTMLを生成」を押してください','err'); return; }
  navigator.clipboard.writeText(genHTML)
    .then(function(){ showSt('bst','✅ コピーしました','ok'); })
    .catch(function(){ showSt('bst','コピー失敗（手動でコピーしてください）','err'); });
});
$('to-post-btn').addEventListener('click', function(){
  if(!genHTML){ showSt('bst','先に「HTMLを生成」を押してください','err'); return; }
  $('f-body').value = genHTML;
  var t=$('b-title').value.trim();
  if(t) $('f-title').value=t;
  document.querySelector('[data-tab="post"]').click();
  window.scrollTo({top:0,behavior:'smooth'});
});

function buildHTML(){
  var title = $('b-title').value.trim();
  var lead  = $('b-lead').value.trim();
  var img   = $('b-img').value.trim();
  var color = $('b-color').value.trim()||'#2c4d39';

  var css='<style>'
    +'.sp{--g:#3f6a4f;--gd:#2c4d39;--gp:#e3ecdf;--bd:#bfa978;--br:#e4ddca;--bs:#f3efe4;--r:10px;font-family:sans-serif;}'
    +'.sp .hero{background:'+color+';padding:2.8rem 1.2rem 2.2rem;color:#fff;'
    +(img?'background-image:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.58)),url('+img+');background-size:cover;background-position:center;':'')+'}'
    +'.sp .eyebrow{font-size:.7rem;letter-spacing:.2em;color:rgba(255,255,255,.7);margin-bottom:.7rem;}'
    +'.sp .sp-h1{font-size:clamp(1.5rem,6vw,2.4rem);font-weight:800;line-height:1.5;margin-bottom:.7rem;}'
    +'.sp .sp-lead{font-size:.9rem;color:rgba(255,255,255,.88);max-width:32em;margin:0;}'
    +'.sp .sec{padding:2.4rem 0;}'
    +'.sp .sec.alt{background:var(--bs);margin:0 -1.2rem;padding:2.4rem 1.2rem;}'
    +'.sp .lbl{font-size:.7rem;letter-spacing:.18em;color:var(--bd);font-weight:700;margin-bottom:.4rem;}'
    +'.sp .sec h2{font-size:clamp(1.1rem,4vw,1.55rem);font-weight:800;color:var(--gd);line-height:1.55;margin-bottom:.8rem;border:none;padding:0;}'
    +'.sp .sec p{font-size:.9rem;color:#444;margin-bottom:.9em;}'
    +'.sp .tl{position:relative;margin-top:1.2rem;}'
    +'.sp .tl::before{content:"";position:absolute;left:17px;top:4px;bottom:4px;width:2px;background:linear-gradient(var(--bd),var(--gp));}'
    +'.sp .tl-item{position:relative;padding-left:2.9rem;margin-bottom:1.8rem;}'
    +'.sp .tl-dot{position:absolute;left:5px;top:.25rem;width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:.75rem;}'
    +'.sp .tl-time{font-size:.68rem;letter-spacing:.1em;color:var(--bd);font-weight:700;margin-bottom:.2rem;}'
    +'.sp .tl-ttl{font-weight:700;font-size:.94rem;margin-bottom:.3rem;}'
    +'.sp .qi{background:#fff;border:1px solid var(--br);border-radius:var(--r);padding:1.1rem;margin-bottom:.8rem;}'
    +'.sp .sq{font-weight:700;color:var(--gd);font-size:.9rem;margin-bottom:.5rem;display:flex;gap:.5rem;}'
    +'.sp .sq::before{content:"Q";flex-shrink:0;width:1.4em;height:1.4em;border-radius:50%;background:var(--gp);color:var(--gd);display:flex;align-items:center;justify-content:center;font-size:.76rem;}'
    +'.sp blockquote{border-left:3px solid var(--bd);padding-left:.9rem;margin:.3rem 0 0;font-size:.86rem;color:#666;font-style:italic;}'
    +'.sp .closing{background:var(--gd);color:#fff;border-radius:var(--r);padding:1.8rem 1.3rem;margin-top:1.8rem;text-align:center;}'
    +'.sp .closing h2{color:#fff;font-size:clamp(1.1rem,4vw,1.55rem);margin-bottom:.8rem;border:none;padding:0;}'
    +'.sp .closing p{font-size:.87rem;color:rgba(255,255,255,.85);max-width:28em;margin:0 auto;}'
    +'</style>';

  var out='<div class="sp"><div class="hero">'
    +'<p class="eyebrow">アンカツ＋ 特集レポート</p>'
    +(title?'<h1 class="sp-h1">'+he(title)+'</h1>':'')
    +(lead?'<p class="sp-lead">'+he(lead)+'</p>':'')
    +'</div>';

  document.querySelectorAll('#secs .sc-card').forEach(function(el,i){
    var m=secList.find(function(s){ return s.id===el.id; }); if(!m) return;
    var alt=(i%2===1)?' alt':'';
    var sh=v(el,'.sc-h');
    if(m.type==='text'){
      var b=v(el,'.sc-b');
      var ps=b.split(/\n{2,}/).filter(Boolean).map(function(p){ return '<p>'+he(p.trim())+'</p>'; }).join('');
      out+='<div class="sec'+alt+'">'+(sh?'<p class="lbl">0'+(i+1)+'</p><h2>'+he(sh)+'</h2>':'')+ps+'</div>';
    } else if(m.type==='tl'){
      var tls='';
      el.querySelectorAll('.sc-tl-wrap .tl-sub').forEach(function(it){
        var time=v(it,'.tl-time'), emoji=v(it,'.tl-emoji')||'●', ttl=v(it,'.tl-ttl'), tb=v(it,'.tl-body');
        tls+='<div class="tl-item"><div class="tl-dot">'+he(emoji)+'</div>'
          +(time?'<p class="tl-time">'+he(time)+'</p>':'')
          +(ttl?'<p class="tl-ttl">'+he(ttl)+'</p>':'')
          +(tb?'<p>'+he(tb)+'</p>':'')
          +'</div>';
      });
      out+='<div class="sec'+alt+'">'+(sh?'<p class="lbl">0'+(i+1)+'</p><h2>'+he(sh)+'</h2>':'')
        +'<div class="tl">'+tls+'</div></div>';
    } else if(m.type==='qa'){
      var qs='';
      el.querySelectorAll('.sc-qa-wrap .q-sub').forEach(function(it){
        var q=v(it,'.qa-q'), a=v(it,'.qa-a');
        qs+='<div class="qi">'+(q?'<p class="sq">'+he(q)+'</p>':'')
          +(a?'<blockquote>「'+he(a)+'」</blockquote>':'')+'</div>';
      });
      out+='<div class="sec'+alt+'">'+(sh?'<p class="lbl">0'+(i+1)+'</p><h2>'+he(sh)+'</h2>':'')
        +qs+'</div>';
    } else if(m.type==='close'){
      var b=v(el,'.sc-b');
      out+='<div class="sec"><div class="closing">'
        +(sh?'<h2>'+he(sh)+'</h2>':'')+(b?'<p>'+he(b)+'</p>':'')
        +'</div></div>';
    }
  });
  out+='</div>';
  return css+'\\n'+out;
}

/* ---------- Utilities ---------- */
function $(id){ return document.getElementById(id); }
function v(el,sel){ var e=el.querySelector(sel); return e?(e.value||'').trim():''; }
function es(s){ return String(s).replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function he(s){ return es(s).replace(/\\n/g,'<br>'); }
function showSt(id,msg,type){
  var el=$(id); el.textContent=msg; el.className='st show '+type;
  clearTimeout(el._t); el._t=setTimeout(function(){ el.classList.remove('show'); },5000);
}

})();
</script>
