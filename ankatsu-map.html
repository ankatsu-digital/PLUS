/* =========================================================================
   空き家マップ機能：地域（町丁目）ごとの世帯数・空き家数データ
   ---------------------------------------------------------------------
   実データは `tokku.geojson`（町丁目境界＋国勢調査ベースの人口・世帯数・面積）
   を読み込んで、区域ポリゴンとして地図に重ね、タップすると実数値を表示する。
   ファイルが見つからない場合は、この機能自体を静かに無効化する。
   ========================================================================= */
let tokkuLayer = null;
let tokkuFeaturesCache = [];

/* 実データ格納用（Firestore読み込み後にここへセットする。未読込時はDEMO_SPOTS） */
let spots = [];

/* アンカツ＋の記事データ（articles コレクション）。
   スポット詳細で「この場所のイベント・記事」として、
   admin側で mapSpotId を紐付けた記事を一覧表示するために読み込む。 */
let mapArticles = [];

function fmtArticleDate(ts){
  try{
    const d = (ts && typeof ts.toDate === 'function') ? ts.toDate() : new Date(ts);
    if(isNaN(d)) return '';
    return d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  }catch(e){ return ''; }
}

/* アンカツ＋側のURL。記事詳細への「戻りリンク」に使用（index39.html側の ANKATSU_MAP_URL と対になる設定） */
const ANKATSU_PLUS_URL = 'index.html'; /* ← 実際に公開する「アンカツ＋」のURLに書き換えてください（別ドメインでもOK） */
function articleUrl(articleId){ return ANKATSU_PLUS_URL + '#article/' + encodeURIComponent(articleId); }

/* =========================================================================
   ③ 徒歩500m円の中心（将来的に settings/walkingZone として管理画面から編集）
   ========================================================================= */
const WALKING_ZONE = { lat: 34.342853, lng: 134.895345, radiusM: 500 };

/* =========================================================================
   ④ 地図の初期化
   ========================================================================= */
const map = L.map('map', {
  zoomControl:false, attributionControl:true, minZoom:15, maxBoundsViscosity:1.0
}).setView([WALKING_ZONE.lat, WALKING_ZONE.lng], 16);

const AWAJI_BOUNDS = L.latLngBounds([34.10,134.62],[34.70,135.05]);
map.setMaxBounds(AWAJI_BOUNDS);

const standardLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'&copy; <a href="https://carto.com/attributions">CARTO</a> &copy; OpenStreetMap contributors', subdomains:'abcd', maxZoom:20 }).addTo(map);
const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'Tiles &copy; Esri', maxZoom:19 });

L.control.scale({ position:'bottomleft', imperial:false }).addTo(map);

/* 徒歩500m円 */
let zoneCircle = L.circle([WALKING_ZONE.lat, WALKING_ZONE.lng], {
  radius: WALKING_ZONE.radiusM, color:'#FF9800', weight:2, opacity:0.85, fillColor:'#FF9800', fillOpacity:0.08, dashArray:'6 6'
}).addTo(map);
let zoneVisible = true;

/* 地域データ（空き家マップ機能）のレイヤーグループ。通常機能として初期表示ON。 */
let areaVisible = true; // 地域データ（tokku.geojson）の表示状態

/* =========================================================================
   ⑤ 距離計算・表示ユーティリティ
   ========================================================================= */
let userLatLng = null; // 現在地（未取得時はnull＝中心市街地からの距離を代替表示）

function distanceLabel(spot){
  const from = userLatLng || L.latLng(WALKING_ZONE.lat, WALKING_ZONE.lng);
  const meters = from.distanceTo(L.latLng(spot.lat, spot.lng));
  const walkMin = Math.max(1, Math.round(meters / 80)); // 徒歩分速約80m換算
  const label = meters < 1000 ? Math.round(meters)+'m' : (meters/1000).toFixed(1)+'km';
  return { meters, label, walkMin, fromCenter: !userLatLng };
}

/* =========================================================================
   ⑥ マーカー・ポップアップ・カード生成
   ========================================================================= */
function createSpotIcon(type){
  const c = CATS[type];
  return L.divIcon({
    className:'custom-spot-marker',
    html:`<div class="marker-pin pin-${type}"><span class="marker-icon">${c.emoji}</span></div>`,
    iconSize:[34,34], iconAnchor:[17,32], popupAnchor:[0,-30]
  });
}

function buildPopupHTML(spot){
  const c = CATS[spot.type];
  const d = distanceLabel(spot);
  const photo = spot.image
    ? `<img class="popup-photo" src="${spot.image}" alt="${spot.title}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'popup-photo-ph',style:'background:${c.color}22',innerHTML:'${c.emoji}'}))">`
    : `<div class="popup-photo-ph" style="background:${c.color}22">${c.emoji}</div>`;
  const dateLine = spot.type==='event' ? `<p class="popup-sub">📅 ${spot.eventDate||''} ${spot.eventTime||''}</p>` : (spot.category2?`<p class="popup-sub">${spot.category2}</p>`:'');
  const isEvent = spot.type==='event';
  const photoBlock = isEvent
    ? `<div class="popup-photo-wrap">
         ${photo}
         <span class="event-photo-badge">EVENT</span>
       </div>`
    : `<div class="popup-photo-wrap">${photo}</div>`;
  return `
    <div class="popup-spot">
      ${photoBlock}
      <div class="popup-body">
        <span class="popup-cat-tag" style="background:${c.color}">${c.emoji} ${c.label}</span>
        <p class="popup-title">${spot.title}</p>
        ${dateLine}
        <p class="popup-dist">🚶 ${d.fromCenter?'中心部から':'現在地から'} 約${d.walkMin}分（${d.label}）</p>
        <button type="button" class="popup-cta" style="background:${c.color}" onclick="openSpotModal('${spot.id}')">くわしく見る ▶</button>
      </div>
    </div>
  `;
}

function buildCardHTML(spot){
  const c = CATS[spot.type];
  const d = distanceLabel(spot);
  const thumbInner = spot.image
    ? `style="background-image:url('${spot.image}')"`
    : '';
  const ph = spot.image ? '' : `<span class="ph" style="background:${c.color}22">${c.emoji}</span>`;
  const eventBadge = spot.type==='event' ? `<span class="card-event-badge">EVENT</span>` : '';
  return `
    <div class="spot-card" data-id="${spot.id}">
      <div class="thumb" ${thumbInner} style="background:${spot.image?'':c.color+'15'}">${ph}${eventBadge}</div>
      <div class="body">
        <span class="cat-label" style="background:${c.color}">${c.emoji} ${c.label}</span>
        <span class="title">${spot.title}</span>
        <span class="sub">${spot.type==='event' ? ('📅 '+(spot.eventDate||'')) : (spot.category2||spot.address||'')}</span>
        <span class="dist">🚶 約${d.walkMin}分（${d.label}）</span>
      </div>
    </div>
  `;
}

let markers = {};
function buildMarkers(){
  // 既存マーカーを一旦クリア（Firestore再読み込み時の重複防止）
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  spots.forEach(spot => {
    const marker = L.marker([spot.lat, spot.lng], { icon:createSpotIcon(spot.type) });
    marker.bindPopup(buildPopupHTML(spot), { maxWidth:260 });
    marker.spotType = spot.type;
    marker.addTo(map);
    markers[spot.id] = marker;
  });
}

/* =========================================================================
   ⑥-2 地域データ（空き家マップ機能）：tokku.geojson の町丁目ポリゴン表示
   ========================================================================= */
const tokkuStyleDefault = { color:'#E9821C', weight:1.5, opacity:0.7, fillColor:'#FF9800', fillOpacity:0.14 };
const tokkuStyleHover   = { color:'#E9821C', weight:2.5, opacity:1,   fillColor:'#FF9800', fillOpacity:0.32 };

function buildAreaPopupHTML(props){
  const areaHa = (props.AREA ? (props.AREA / 10000) : 0).toFixed(1);
  return `
    <div class="area-popup">
      <div class="area-popup-body">
        <p class="area-popup-eyebrow">空家等活用促進区域・地域データ</p>
        <p class="area-popup-title">🏘️ ${props.S_NAME || '対象地区'}</p>
        <div class="area-stat-grid">
          <div class="area-stat"><div class="area-stat-label">人口</div><div class="area-stat-value">${props.JINKO ?? '-'}<span class="unit">人</span></div></div>
          <div class="area-stat"><div class="area-stat-label">世帯数</div><div class="area-stat-value">${props.SETAI ?? '-'}<span class="unit">世帯</span></div></div>
          <div class="area-stat"><div class="area-stat-label">面積</div><div class="area-stat-value">${areaHa}<span class="unit">ha</span></div></div>
        </div>
        <p class="area-popup-desc">国勢調査ベースの町丁目データです。空き家等活用促進区域として、建て替え・用途変更の規制が緩和されているエリアです。</p>
      </div>
    </div>
  `;
}

async function loadTokkuLayer(){
  try{
    const res = await fetch('tokku.geojson');
    if(!res.ok) throw new Error('tokku.geojson が見つかりません');
    const data = await res.json();
    tokkuFeaturesCache = data.features.map(f => f.properties);

    tokkuLayer = L.geoJSON(data, {
      style: () => tokkuStyleDefault,
      onEachFeature: (feature, layer) => {
        layer.on('mouseover', () => layer.setStyle(tokkuStyleHover));
        layer.on('mouseout',  () => layer.setStyle(tokkuStyleDefault));
        layer.bindPopup(buildAreaPopupHTML(feature.properties), { className:'area-popup', maxWidth:240 });
      }
    });
    if(areaVisible) tokkuLayer.addTo(map);
  }catch(e){
    console.warn('地域データ（tokku.geojson）読み込みエラー:', e);
    document.getElementById('area-toggle-btn').style.display = 'none'; // データが無い場合はボタンごと隠す
  }
}

/* =========================================================================
   ⑦ カテゴリタブ・件数・リスト同期
   ========================================================================= */
let activeCat = 'all';

function updateCounts(){
  Object.keys(CATS).forEach(t => {
    document.getElementById('cnt-'+t).textContent = spots.filter(s=>s.type===t).length;
  });
  document.getElementById('cnt-all').textContent = spots.length;
}

function applyFilter(cat){
  activeCat = cat;
  document.querySelectorAll('.cat-tab').forEach(el => el.classList.toggle('active', el.dataset.cat===cat));

  const statusEl = document.getElementById('filter-status');
  if(cat==='all'){
    statusEl.textContent = 'すべて表示中';
  } else {
    const c = CATS[cat];
    statusEl.textContent = `${c.emoji} ${c.label}のみ`;
  }

  Object.values(markers).forEach(m => {
    const show = (cat==='all' || m.spotType===cat);
    if(show && !map.hasLayer(m)) m.addTo(map);
    if(!show && map.hasLayer(m)) map.removeLayer(m);
  });

  renderList();
}

function renderList(){
  const filtered = spots.filter(s => activeCat==='all' || s.type===activeCat);
  document.getElementById('list-count').textContent = filtered.length + '件';
  const listEl = document.getElementById('spot-list');

  if(!filtered.length){
    listEl.innerHTML = '<div class="empty-msg">このカテゴリのスポットはまだありません</div>';
    return;
  }

  // 現在地 or 中心市街地からの距離が近い順に並べる
  const sorted = [...filtered].sort((a,b) => distanceLabel(a).meters - distanceLabel(b).meters);
  listEl.innerHTML = sorted.map(buildCardHTML).join('');

  document.querySelectorAll('.spot-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const spot = spots.find(s=>s.id===id);
      map.flyTo([spot.lat, spot.lng], 17, { duration:0.9 });
      markers[id].openPopup();
      if(window.innerWidth <= 820) document.getElementById('list-panel').classList.remove('open');
    });
  });
}

document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    applyFilter(tab.dataset.cat);
    document.getElementById('filter-panel').classList.remove('expanded'); // 選択したら自動で閉じる
  });
});

/* =========================================================================
   ⑥-2 Firestore からのスポット読み込み
   ---------------------------------------------------------------------
   `spots` コレクションのドキュメントを取得。1件も無ければ DEMO_SPOTS を
   フォールバック表示する（開発中・データ未投入でも画面が空にならないように）。
   ドキュメントのフィールド構成は企画書「④データ構造」の共通スキーマに準拠。
   ========================================================================= */
async function loadSpots(){
  const db = window._db, ops = window._firestoreOp;
  if(!db || !ops){ spots = DEMO_SPOTS; return; }
  try{
    const snap = await ops.getDocs(ops.collection(db, 'spots'));
    const fetched = snap.docs
      .map(d => Object.assign({ id:d.id }, d.data()))
      .filter(s => s.published !== false && typeof s.lat === 'number' && typeof s.lng === 'number');
    spots = fetched.length ? fetched : DEMO_SPOTS;
  }catch(e){
    console.error('spots読み込みエラー:', e);
    spots = DEMO_SPOTS;
  }
}

/* アンカツ＋の記事（articles コレクション）を読み込む。
   admin.html の記事フォームで「🗺️ 地図スポット」に紐付けた記事（mapSpotId）を
   スポット詳細パネルの「この場所のイベント・記事」として表示するために使用する。 */
async function loadMapArticles(){
  const db = window._db, ops = window._firestoreOp;
  if(!db || !ops){ mapArticles = []; return; }
  try{
    const snap = await ops.getDocs(ops.collection(db, 'articles'));
    const now = new Date();
    mapArticles = snap.docs
      .map(d => Object.assign({ id:d.id }, d.data()))
      .filter(a => {
        if(!a.mapSpotId) return false; // スポットに紐付いていない記事は対象外
        try{
          const createdAtDate = (a.createdAt && a.createdAt.toDate) ? a.createdAt.toDate() : (a.createdAt ? new Date(a.createdAt) : null);
          return !createdAtDate || isNaN(createdAtDate) || createdAtDate <= now; // 予約投稿（未来日時）は非表示
        }catch(e){ return true; }
      });
  }catch(e){
    console.error('articles読み込みエラー:', e);
    mapArticles = [];
  }
}

function renderSpotsUI(){
  buildMarkers();
  updateCounts();
  applyFilter(activeCat);
  handleSpotHash(); // #spot/<id> のディープリンクに対応
}

/* URLハッシュ #spot/<id> でページを開いた場合、該当スポットへ自動でフライ＆詳細表示
   （アンカツ＋の記事から「この場所をアンカツMAPで見る」リンクで来た時などに使用） */
function handleSpotHash(){
  const h = location.hash;
  if(!h.startsWith('#spot/')) return;
  const id = decodeURIComponent(h.slice(6));
  const spot = spots.find(s => s.id === id);
  if(!spot) { showToast('指定されたスポットが見つかりませんでした'); return; }
  map.flyTo([spot.lat, spot.lng], 17, { duration:0.9 });
  openSpotModal(id);
  if(markers[id]) markers[id].openPopup();
}
window.addEventListener('hashchange', handleSpotHash);

async function initSpots(){
  await Promise.all([loadSpots(), loadMapArticles(), loadTokkuLayer()]);
  renderSpotsUI();
  document.getElementById('loading-overlay').classList.add('hidden');
}

if(window._db){
  initSpots();
} else {
  document.addEventListener('firebase-ready', initSpots, { once:true });
  // Firebase初期化に失敗/大幅に遅延した場合のフォールバック（数秒待っても来なければDEMOで表示）
  setTimeout(() => { if(!spots.length) initSpots(); }, 4000);
}

/* =========================================================================
   ⑧ 詳細モーダル
   ========================================================================= */
const spotModal = document.getElementById('spot-modal');

function openSpotModal(id){
  const spot = spots.find(s=>s.id===id);
  if(!spot) return;
  const c = CATS[spot.type];
  const d = distanceLabel(spot);

  const isEvent = spot.type==='event';
  const photoInner = spot.image
    ? `<img class="modal-photo" src="${spot.image}" alt="${spot.title}" onerror="this.outerHTML='<div class=\\'modal-photo-ph\\' style=\\'background:${c.color}22\\'>${c.emoji}</div>'">`
    : `<div class="modal-photo-ph" style="background:${c.color}22">${c.emoji}</div>`;
  document.getElementById('modal-photo-wrap').innerHTML = isEvent
    ? `${photoInner}<span class="event-photo-badge">EVENT INFORMATION</span>`
    : photoInner;

  document.getElementById('modal-cat-tag').textContent = c.emoji+' '+c.label;
  document.getElementById('modal-cat-tag').style.background = c.color;
  document.getElementById('modal-title').textContent = spot.title;
  document.getElementById('modal-sub').textContent = spot.category2 || '';

  // メタ情報チップ
  let meta = [];
  meta.push(`🚶 ${d.fromCenter?'中心部から':'現在地から'} 約${d.walkMin}分（${d.label}）`);
  if(spot.type==='event'){ meta.push(`📅 ${spot.eventDate||''}${spot.eventEndDate?'〜'+spot.eventEndDate:''}`); if(spot.eventTime) meta.push(`🕒 ${spot.eventTime}`); }
  if(spot.openingHours) meta.push(`🕒 ${spot.openingHours}`);
  if(spot.priceRange) meta.push(`💰 ${spot.priceRange}`);
  if(spot.status) meta.push(`🏷️ ${spot.status}`);
  document.getElementById('modal-meta-row').innerHTML = meta.map(m=>`<span class="modal-meta-chip">${m}</span>`).join('');

  document.getElementById('modal-address').innerHTML = spot.address ? `📍 <span>${spot.address}</span>` : '';
  document.getElementById('modal-desc').textContent = spot.description || '';

  let links = '';
  if(spot.linkUrl && spot.linkUrl !== '#'){
    links += `<a class="modal-cta" style="background:${c.color}" href="${spot.linkUrl}" target="_blank" rel="noopener">${c.cta}</a>`;
  }
  if(spot.relatedArticleId){
    links += `<a class="modal-cta secondary" href="${articleUrl(spot.relatedArticleId)}" target="_blank" rel="noopener">📰 アンカツ＋の記事を読む</a>`;
  }
  if(!links){
    links = `<span style="font-size:12px;color:var(--color-ink-sub)">詳細情報は準備中です</span>`;
  }
  document.getElementById('modal-link-row').innerHTML = links;

  // この場所に紐付いた記事（admin側の記事フォームで mapSpotId を設定したもの）
  const related = mapArticles
    .filter(a => a.mapSpotId === spot.id)
    .sort((a,b) => {
      const ta = (a.createdAt && a.createdAt.toDate) ? a.createdAt.toDate() : new Date(a.createdAt||0);
      const tb = (b.createdAt && b.createdAt.toDate) ? b.createdAt.toDate() : new Date(b.createdAt||0);
      return tb - ta;
    });
  const relatedSection = document.getElementById('modal-related-section');
  if(related.length){
    document.getElementById('modal-related-title').textContent = isEvent ? '🎉 この場所で開催されるイベント' : '📰 この場所のイベント・記事';
    document.getElementById('modal-related-list').innerHTML = related.map(a => {
      const thumb = a.thumbnail
        ? `<img class="rel-thumb" src="${a.thumbnail}" alt="${a.title}">`
        : `<div class="rel-thumb-ph">📰</div>`;
      return `
        <a class="modal-related-card" href="${articleUrl(a.id)}" target="_blank" rel="noopener">
          ${thumb}
          <div class="rel-body">
            <div class="rel-title">${a.title}</div>
            <div class="rel-date">${a.category ? a.category+' ・ ' : ''}${fmtArticleDate(a.createdAt)}</div>
          </div>
        </a>
      `;
    }).join('');
    relatedSection.style.display = 'block';
  } else {
    relatedSection.style.display = 'none';
  }

  spotModal.classList.add('open');
}

function closeSpotModal(){ spotModal.classList.remove('open'); }
document.getElementById('modal-close-btn').addEventListener('click', closeSpotModal);
spotModal.addEventListener('click', (e)=>{ if(e.target===spotModal) closeSpotModal(); });

let myLocationMarker = null;
const locateBtn = document.getElementById('locate-btn');
locateBtn.addEventListener('click', () => {
  if(!navigator.geolocation){ showToast('この端末では現在地を取得できません'); return; }
  locateBtn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      locateBtn.classList.remove('locating');

      userLatLng = L.latLng(latitude, longitude);
      if(myLocationMarker) map.removeLayer(myLocationMarker);
      myLocationMarker = L.marker([latitude, longitude], {
        icon: L.divIcon({ className:'', html:'<div class="my-location-dot"></div>', iconSize:[18,18], iconAnchor:[9,9] })
      }).addTo(map);
      map.flyTo([latitude, longitude], 16, { duration:0.9 });
      showToast('現在地を取得しました。距離表示を現在地基準に更新します');

});

/* =========================================================================
   ⑪ 検索（Nominatim + スポット名の簡易検索を統合）
   ========================================================================= */
const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');
const searchSuggest = document.getElementById('search-suggest');

function localSpotMatches(query){
  const kw = query.toLowerCase();
  return spots.filter(s =>
    s.title.toLowerCase().includes(kw) ||
    (s.address||'').toLowerCase().includes(kw) ||
    (s.tags||[]).some(t=>t.toLowerCase().includes(kw)) ||
    (s.category2||'').toLowerCase().includes(kw)
  );
}

async function runSearch(){
  const query = searchInput.value.trim();
  if(!query) return;
  searchSuggest.innerHTML = '<div class="suggest-item">検索中...</div>';
  searchSuggest.style.display = 'block';

  const localResults = localSpotMatches(query);
  let html = '';
  localResults.forEach(s => {
    const c = CATS[s.type];
    html += `<div class="suggest-item" data-spot="${s.id}"><span>${c.emoji}</span><span>${s.title}</span></div>`;
  });

  try{
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=4&countrycodes=jp&viewbox=134.75,34.62,135.05,34.20&bounded=0&q=${encodeURIComponent(query+' 洲本市')}`;
    const res = await fetch(url);
    const results = await res.json();
    results.forEach((r,i) => { html += `<div class="suggest-item" data-geo="${r.lat},${r.lon}"><span>📍</span><span>${r.display_name}</span></div>`; });
  }catch(e){ /* Nominatim失敗時はローカル結果のみ表示 */ }

  searchSuggest.innerHTML = html || '<div class="suggest-item">該当する場所が見つかりませんでした</div>';

  searchSuggest.querySelectorAll('.suggest-item[data-spot]').forEach(el => {
    el.addEventListener('click', () => {
      const spot = spots.find(s=>s.id===el.dataset.spot);
      map.flyTo([spot.lat, spot.lng], 17, { duration:0.9 });
      markers[spot.id].openPopup();
      searchSuggest.style.display = 'none';
    });
  });
  searchSuggest.querySelectorAll('.suggest-item[data-geo]').forEach(el => {
    el.addEventListener('click', () => {
      const [lat,lng] = el.dataset.geo.split(',').map(Number);
      map.flyTo([lat,lng], 16, { duration:0.9 });
      searchSuggest.style.display = 'none';
    });
  });
}

searchBtn.addEventListener('click', runSearch);
searchInput.addEventListener('keydown', (e) => { if(e.key==='Enter') runSearch(); });
document.addEventListener('click', (e) => {
  if(!document.getElementById('search-wrap').contains(e.target)) searchSuggest.style.display = 'none';
});
