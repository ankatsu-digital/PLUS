<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>財産管理アプリ</title>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f2f4f7;
    color: #222;
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, #2b6cb0, #2c5282);
    color: #fff;
    padding: 18px 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .container { max-width: 640px; margin: 0 auto; padding: 16px; }

  .card-panel {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  .section-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #2c5282;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    font-size: 0.95rem;
    font-weight: 600;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    flex: 1;
    min-width: 120px;
  }
  button:active { transform: scale(0.97); }
  .btn-primary { background: #2b6cb0; color: #fff; }
  .btn-secondary { background: #edf2f7; color: #2b6cb0; border: 1px solid #cbd5e0; }
  .btn-danger { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; flex: none; padding: 8px 14px; font-size: 0.85rem; }
  .btn-success { background: #38a169; color: #fff; }
  .btn-success:disabled, button:disabled { opacity: 0.5; cursor: not-allowed; }

  #video-wrap {
    position: relative;
    width: 100%;
    max-height: 320px;
    overflow: hidden;
    border-radius: 12px;
    background: #000;
    display: none;
    margin-top: 12px;
  }
  #video { width: 100%; display: block; max-height: 320px; object-fit: cover; }
  .scan-guide {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 40%;
    border: 3px solid rgba(56, 161, 105, 0.8);
    border-radius: 10px;
    pointer-events: none;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.25);
  }

  input[type="file"] { display: none; }

  .result-box {
    margin-top: 12px;
    padding: 14px;
    border-radius: 10px;
    background: #ebf8ff;
    border: 1px solid #90cdf4;
    display: none;
  }
  .result-box.show { display: block; }
  .result-code {
    font-family: "Courier New", monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a365d;
    word-break: break-all;
  }
  .result-format {
    font-size: 0.75rem;
    color: #4a5568;
    margin-top: 4px;
  }

  .msg {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    display: none;
  }
  .msg.show { display: block; }
  .msg.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
  .msg.warn { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }
  .msg.success { background: #f0fff4; color: #2f855a; border: 1px solid #9ae6b4; }

  label.field-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #4a5568;
    margin: 12px 0 6px;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }

  .item-list { margin-top: 8px; }
  .item-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    border-left: 4px solid #2b6cb0;
  }
  .item-card .name { font-size: 1.05rem; font-weight: 700; color: #1a202c; }
  .item-card .code {
    font-family: "Courier New", monospace;
    font-size: 0.85rem;
    color: #2b6cb0;
    margin-top: 4px;
    word-break: break-all;
  }
  .item-card .memo {
    font-size: 0.85rem;
    color: #4a5568;
    margin-top: 6px;
    white-space: pre-wrap;
  }
  .item-card .meta {
    font-size: 0.72rem;
    color: #a0aec0;
    margin-top: 8px;
  }
  .item-card .actions {
    margin-top: 10px;
    display: flex;
    justify-content: flex-end;
  }
  .empty-state {
    text-align: center;
    color: #a0aec0;
    padding: 30px 10px;
    font-size: 0.9rem;
  }
  .count-badge {
    display: inline-block;
    background: #2b6cb0;
    color: #fff;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .search-box { margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>📦 財産管理アプリ</h1>
</header>

<div class="container">

  <!-- 読み取りパネル -->
  <div class="card-panel">
    <div class="section-title">🔍 バーコード読み取り</div>
    <div class="btn-row">
      <button class="btn-primary" id="btnCamera">📷 カメラで読取</button>
      <button class="btn-secondary" id="btnImage">🖼️ 画像から読取</button>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div id="video-wrap">
      <video id="video" playsinline autoplay muted></video>
      <div class="scan-guide"></div>
    </div>
    <div class="btn-row" id="cameraStopRow" style="display:none; margin-top:10px;">
      <button class="btn-danger" style="flex:1;" id="btnStopCamera">■ カメラ停止</button>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-code" id="resultCode"></div>
      <div class="result-format" id="resultFormat"></div>
    </div>

    <div class="msg" id="msgBox"></div>
  </div>

  <!-- 登録フォーム -->
  <div class="card-panel" id="formPanel" style="display:none;">
    <div class="section-title">📝 物品情報を登録</div>
    <label class="field-label">名前 <span style="color:#c53030;">*</span></label>
    <input type="text" id="itemName" placeholder="例）ノートPC">
    <label class="field-label">メモ</label>
    <textarea id="itemMemo" placeholder="保管場所や購入日など"></textarea>
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn-success" id="btnSave">💾 保存する</button>
      <button class="btn-secondary" id="btnCancel">キャンセル</button>
    </div>
  </div>

  <!-- 一覧 -->
  <div class="card-panel">
    <div class="section-title">
      📋 登録済み一覧 <span class="count-badge" id="countBadge">0</span>
    </div>
    <input type="text" id="searchInput" class="search-box" placeholder="名前・コードで検索">
    <div class="item-list" id="itemList"></div>
  </div>

</div>

<script>
(function() {
  const { BrowserMultiFormatReader, DecodeHintType, BarcodeFormat, NotFoundException } = ZXing;

  const STORAGE_KEY = 'property_items_v1';

  let codeReader = null;
  let currentStream = null;
  let pendingCode = null;
  let pendingFormat = null;

  const videoWrap = document.getElementById('video-wrap');
  const video = document.getElementById('video');
  const btnCamera = document.getElementById('btnCamera');
  const btnStopCamera = document.getElementById('btnStopCamera');
  const cameraStopRow = document.getElementById('cameraStopRow');
  const btnImage = document.getElementById('btnImage');
  const fileInput = document.getElementById('fileInput');
  const resultBox = document.getElementById('resultBox');
  const resultCode = document.getElementById('resultCode');
  const resultFormat = document.getElementById('resultFormat');
  const msgBox = document.getElementById('msgBox');
  const formPanel = document.getElementById('formPanel');
  const itemName = document.getElementById('itemName');
  const itemMemo = document.getElementById('itemMemo');
  const btnSave = document.getElementById('btnSave');
  const btnCancel = document.getElementById('btnCancel');
  const itemList = document.getElementById('itemList');
  const countBadge = document.getElementById('countBadge');
  const searchInput = document.getElementById('searchInput');

  // ---------- Hints (共通設定) ----------
  function buildHints(tryHarder) {
    const hints = new Map();
    const formats = [
      BarcodeFormat.QR_CODE,
      BarcodeFormat.CODE_128,
      BarcodeFormat.CODE_39,
      BarcodeFormat.EAN_13,
      BarcodeFormat.EAN_8,
      BarcodeFormat.UPC_A,
      BarcodeFormat.UPC_E,
      BarcodeFormat.ITF,
      BarcodeFormat.CODABAR,
      BarcodeFormat.DATA_MATRIX,
      BarcodeFormat.PDF_417
    ];
    hints.set(DecodeHintType.POSSIBLE_FORMATS, formats);
    if (tryHarder) {
      hints.set(DecodeHintType.TRY_HARDER, true);
    }
    return hints;
  }

  function getReader() {
    if (!codeReader) {
      codeReader = new BrowserMultiFormatReader(buildHints(false));
    }
    return codeReader;
  }

  // ---------- メッセージ表示 ----------
  function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className = 'msg show ' + type;
  }
  function clearMsg() {
    msgBox.className = 'msg';
    msgBox.textContent = '';
  }

  function showResult(code, format) {
    pendingCode = code;
    pendingFormat = format;
    resultCode.textContent = code;
    resultFormat.textContent = 'フォーマット: ' + format;
    resultBox.classList.add('show');

    if (isDuplicate(code)) {
      showMsg('⚠️ このバーコードは既に登録されています（重複登録はできません）', 'warn');
      formPanel.style.display = 'none';
    } else {
      showMsg('✅ 読み取りに成功しました。情報を入力して保存してください。', 'success');
      formPanel.style.display = 'block';
      itemName.value = '';
      itemMemo.value = '';
      itemName.focus();
    }
  }

  // ---------- カメラ読み取り ----------
  btnCamera.addEventListener('click', async () => {
    clearMsg();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showMsg('❌ このブラウザはカメラ機能に対応していません。', 'error');
      return;
    }
    try {
      videoWrap.style.display = 'block';
      cameraStopRow.style.display = 'flex';
      const reader = getReader();

      currentStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }
      });
      video.srcObject = currentStream;

      reader.decodeFromVideoDevice(null, video, (result, err) => {
        if (result) {
          showMsg('📷 カメラで読み取りました', 'success');
          showResult(result.getText(), result.getBarcodeFormat ? BarcodeFormat[result.getBarcodeFormat()] : result.format);
          stopCamera();
        }
        // NotFoundExceptionは読み取り中の通常状態なので無視
        if (err && !(err instanceof NotFoundException)) {
          // 継続的なスキャンエラーは無視（連続スキャン中のため）
        }
      });
    } catch (e) {
      showMsg('❌ カメラを起動できませんでした。権限設定をご確認ください。（' + e.message + '）', 'error');
      videoWrap.style.display = 'none';
      cameraStopRow.style.display = 'none';
    }
  });

  function stopCamera() {
    if (codeReader) {
      try { codeReader.reset(); } catch (e) {}
    }
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    videoWrap.style.display = 'none';
    cameraStopRow.style.display = 'none';
  }

  btnStopCamera.addEventListener('click', () => {
    stopCamera();
    showMsg('カメラを停止しました。', 'warn');
  });

  // ---------- 画像ファイルから読み取り ----------
  btnImage.addEventListener('click', () => {
    clearMsg();
    fileInput.value = '';
    fileInput.click();
  });

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
      showMsg('❌ 画像ファイル（jpg/png等）を選択してください。', 'error');
      return;
    }

    clearMsg();
    showMsg('🔎 画像を解析しています…', 'success');

    try {
      const imageUrl = URL.createObjectURL(file);
      const imgEl = new Image();
      imgEl.src = imageUrl;

      await new Promise((resolve, reject) => {
        imgEl.onload = resolve;
        imgEl.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
      });

      const result = await decodeImageWithFallback(imgEl);
      URL.revokeObjectURL(imageUrl);

      if (result) {
        const formatName = result.getBarcodeFormat ? BarcodeFormat[result.getBarcodeFormat()] : (result.format || '不明');
        showMsg('🖼️ 画像からの読み取りに成功しました', 'success');
        showResult(result.getText(), formatName);
      } else {
        showMsg('❌ バーコードを検出できませんでした。画像の向き・明るさ・ピント等を確認して再度お試しください。', 'error');
      }
    } catch (err) {
      showMsg('❌ 読み取り中にエラーが発生しました：' + err.message, 'error');
    }
  });

  // TRY_HARDERヒントを設定し、複数の前処理パターンで成功率を高める
  async function decodeImageWithFallback(imgEl) {
    const tryHarderReader = new BrowserMultiFormatReader(buildHints(true));

    // 1. そのままdecodeFromImageElementで試行（TRY_HARDER有効）
    try {
      const result = await tryHarderReader.decodeFromImageElement(imgEl);
      if (result) return result;
    } catch (e) {
      // 失敗したら次の手段へ
    }

    // 2. キャンバスでリサイズ・コントラスト強調してから再試行
    const variants = buildImageVariants(imgEl);
    for (const variantImg of variants) {
      try {
        const result = await tryHarderReader.decodeFromImageElement(variantImg);
        if (result) return result;
      } catch (e) {
        // 次のバリアントへ
      }
    }

    return null;
  }

  // 画像の前処理バリエーション（拡大・グレースケール+コントラスト強調）を生成
  function buildImageVariants(imgEl) {
    const variants = [];
    const naturalW = imgEl.naturalWidth || imgEl.width;
    const naturalH = imgEl.naturalHeight || imgEl.height;
    if (!naturalW || !naturalH) return variants;

    const scales = [1, 1.6, 2.2];

    scales.forEach(scale => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(naturalW * scale);
        canvas.height = Math.round(naturalH * scale);
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);

        // グレースケール化 + コントラスト強調
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const contrast = 1.35;
        const intercept = 128 * (1 - contrast);
        for (let i = 0; i < data.length; i += 4) {
          const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
          let v = gray * contrast + intercept;
          v = Math.max(0, Math.min(255, v));
          data[i] = data[i + 1] = data[i + 2] = v;
        }
        ctx.putImageData(imageData, 0, 0);

        const variantImg = new Image();
        variantImg.src = canvas.toDataURL('image/png');
        variants.push(variantImg);
      } catch (e) {
        // このバリアント生成に失敗しても続行
      }
    });

    return variants;
  }

  // 画像要素の読み込み完了を待ってから配列を返すためのラップ
  async function waitForImagesLoaded(imgs) {
    await Promise.all(imgs.map(img => {
      if (img.complete) return Promise.resolve();
      return new Promise(res => { img.onload = res; img.onerror = res; });
    }));
    return imgs;
  }

  // ---------- 重複チェック ----------
  function isDuplicate(code) {
    const items = loadItems();
    return items.some(it => it.code === code);
  }

  // ---------- 保存 ----------
  function loadItems() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveItems(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  btnSave.addEventListener('click', () => {
    const name = itemName.value.trim();
    if (!name) {
      showMsg('❌ 名前を入力してください。', 'error');
      itemName.focus();
      return;
    }
    if (!pendingCode) {
      showMsg('❌ 読み取ったバーコードがありません。先にスキャンしてください。', 'error');
      return;
    }
    if (isDuplicate(pendingCode)) {
      showMsg('⚠️ このバーコードは既に登録されています。', 'warn');
      return;
    }

    const items = loadItems();
    const newItem = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      code: pendingCode,
      format: pendingFormat || '',
      name: name,
      memo: itemMemo.value.trim(),
      createdAt: new Date().toISOString()
    };
    items.unshift(newItem);
    saveItems(items);

    showMsg('✅ 登録しました！', 'success');
    resetAfterSave();
    renderList();
  });

  btnCancel.addEventListener('click', () => {
    resetAfterSave();
    clearMsg();
  });

  function resetAfterSave() {
    formPanel.style.display = 'none';
    resultBox.classList.remove('show');
    pendingCode = null;
    pendingFormat = null;
    itemName.value = '';
    itemMemo.value = '';
  }

  // ---------- 一覧表示 ----------
  function formatDate(iso) {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function renderList() {
    const items = loadItems();
    const keyword = searchInput.value.trim().toLowerCase();
    const filtered = keyword
      ? items.filter(it =>
          it.name.toLowerCase().includes(keyword) ||
          it.code.toLowerCase().includes(keyword) ||
          (it.memo && it.memo.toLowerCase().includes(keyword))
        )
      : items;

    countBadge.textContent = items.length;

    if (filtered.length === 0) {
      itemList.innerHTML = `<div class="empty-state">${items.length === 0 ? '登録された物品はまだありません。' : '該当する物品が見つかりません。'}</div>`;
      return;
    }

    itemList.innerHTML = filtered.map(it => `
      <div class="item-card" data-id="${it.id}">
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="code">🔖 ${escapeHtml(it.code)} <span style="color:#a0aec0;">(${escapeHtml(it.format || '')})</span></div>
        ${it.memo ? `<div class="memo">${escapeHtml(it.memo)}</div>` : ''}
        <div class="meta">登録日時: ${formatDate(it.createdAt)}</div>
        <div class="actions">
          <button class="btn-danger delete-btn" data-id="${it.id}">🗑️ 削除</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  itemList.addEventListener('click', (e) => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;
    const id = btn.getAttribute('data-id');
    if (confirm('この物品を削除しますか？')) {
      const items = loadItems().filter(it => it.id !== id);
      saveItems(items);
      renderList();
    }
  });

  searchInput.addEventListener('input', renderList);

  // 初期表示
  renderList();

  // ページ離脱時にカメラを停止
  window.addEventListener('beforeunload', stopCamera);
})();
</script>

</body>
</html>
